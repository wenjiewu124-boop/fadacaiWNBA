name: V3.9 Historical Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy joblib supabase scikit-learn xgboost

    - name: Execute V3.9 Backfill Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        API_BASKETBALL_KEY: ${{ secrets.API_BASKETBALL_KEY }}
      run: |
        echo "===== 🚜 运行历史数据补齐 (Backfill) ====="
        python backfill_v3_data.py

    - name: Execute V3.9 Backtest Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        API_BASKETBALL_KEY: ${{ secrets.API_BASKETBALL_KEY }}
      run: |
        echo "===== 🚀 V3.9 Historical Backtest Engine ====="
        python backtest_v39.py

    - name: Upload Backtest Reports (CSV & TXT)
      uses: actions/upload-artifact@v4
      with:
        name: V39_Backtest_Results
        path: |
          V3.9_Backtest_Report.csv
          V3.9_Backtest_Summary.txt
