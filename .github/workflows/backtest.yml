name: V3.9 Final Historical Backtest

on:
  workflow_dispatch:

jobs:
  run-backtest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
         fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy joblib supabase scikit-learn xgboost

    - name: 1. 执行 V3.9 纯血数据重构 (True Backfill)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: .
      run: |
        echo "===== 🚜 启动 V3.9 纯血历史特征重构 ====="
        python historical_backfill_v39.py

    - name: 2. 执行 V3.9 终极回测 (Backtest)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: .
      run: |
        echo "===== 🚀 启动终极回测 ====="
        python backtest_v39.py
